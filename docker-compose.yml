# Disposable Postgres+pgvector for memorease local dev, tests, and live proof.
# Usage:
#   sudo docker compose up -d
#   export MEMOREASE_PG_TEST_CONNECTION=postgresql://memorease:memorease@localhost:5432/memorease
#   pnpm test
#   sudo docker compose down -v   # tear down (drops data via named volume)

services:
  pgvector:
    image: pgvector/pgvector:0.8.0-pg17
    container_name: memorease-pgvector
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: memorease
      POSTGRES_PASSWORD: memorease
      POSTGRES_DB: memorease
    volumes:
      - memorease-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memorease -d memorease"]
      interval: 2s
      timeout: 3s
      retries: 10

volumes:
  memorease-pgdata:
